<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-assets>
      <img id="plastic" src="plastic.jpg">
      <img id="fabric" src="fabric.jpg">
      <img id="plastic2" src="plastic2.jpg">
      <img id="blue_plastic" src="blue_plastic.jpg">
    </a-assets>

    <a-scene>
      <a-cylinder src="#plastic" color="#ffffff" position="1 0.75 -3" radius="0.05" height="2" color="#FFC65D"></a-cylinder>
      <a-cone src="#fabric" color="#ffffff" position=" 1 1.5 -3" radius-bottom="1.2" radius-top="0.05" height="0.6"></a-cone>
      <a-box src="#blue_plastic"  position="0 0.3 -3" width="1" height="0.6" depth="0.6"></a-box>
      <a-box src="#plastic2" position="0 0.65 -3" width="1.05" height="0.15" depth="0.65"></a-box>  
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky src = "3d.png"></a-sky>
    </a-scene>
  </body>
</html>
