<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
       <a-assets>
        <a-asset-item id="enterprise" src="assets/enterprise.obj"></a-asset-item>
        <a-asset-item id="mcrn" src="assets/mcrn.obj"></a-asset-item>
        <img id="rusty" src="assets/rusty.png">
        <img id="silver" src="assets/silver.png">
       </a-assets>

       <a-obj-model id="USS_Enterprise" src="#enterprise" position="-1 2.375 -3" rotation="0 -90 0" scale="2 2 2" material="src:#silver"></a-obj-model>
       <a-obj-model id="MCRN" src="#mcrn" position="-84 27 60" rotation="10 140 0" scale="1 1 1" material="src:#rusty"></a-obj-model>

      <a-text
        value="Thats no moon!"
        position="-4 4 -9"
        color="#ffffff"
        width="6"
        align="center"
        rotation="0 90 0">
      </a-text>

      <a-sky src="assets/project3sky.png"></a-sky>
    </a-scene>

  </body>
</html>
