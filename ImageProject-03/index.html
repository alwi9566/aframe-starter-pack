<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
       <a-assets>
        <a-asset-item id="ship" src="ship.obj"></a-asset-item>
        <img id="metalship" src="metal.png">
       </a-assets>
       <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> 

       <a-obj-model src="#ship" position="0 45 0" scale="0.001 0.001 0.001" material="src:#metalship"></a-obj-model>

      <a-sky src="project3sky.png"></a-sky>
    </a-scene>
  </body>
</html>
