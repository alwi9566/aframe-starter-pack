<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> -->
      <a-sphere id="base" position="0 2.043 -5" radius="2" color="white"></a-sphere> 
      <a-sphere id="middle" position="0 5.287 -5" radius="1.5" color="white"></a-sphere>
      <a-sphere id="head" position="0 7.720 -5" radius="1.25" color="white"></a-sphere>
      <a-cone id="nose" position="-0.021 7.440 -2.583" rotation="90.000 0.000 0.000" scale=".250 3 .250" radius="1" color="orange"  ></a-cone>
      <a-sphere id="eyeLeft" position="-.53 8.047 -3.940"  radius=".25" color="black" ></a-sphere>
      <a-sphere id="eyeRight" position="0.438 8.047 -3.933"  radius=".25" color="black" ></a-sphere>
      <a-sphere id="button1" position="-0.021 4.4 -3.883"  radius=".25" color="black" ></a-sphere>
      <a-sphere id="button2" position="-0.021 5 -3.583"  radius=".25" color="black" ></a-sphere>
      <a-sphere id="button3" position="-0.021 5.8 -3.73"  radius=".25" color="black" ></a-sphere>
      <a-cylinder id="hatBase" position="0 9 -5" radius="2" height=".5" color="black"></a-cylinder>
      <a-cylinder id="hat" position="0 14 -5" radius="1.5" height="10" color="black"></a-cylinder>

      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: contact; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
